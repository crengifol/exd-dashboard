name: Keep Supabase alive

# Evita que el free tier de Supabase pause la BD tras ~7 días de inactividad.
# Hace un request diario a un endpoint que consulta la base de datos, lo que
# registra actividad y mantiene el proyecto activo. De paso despierta el
# backend en Render (que duerme tras 15 min de inactividad).

on:
  schedule:
    # Todos los días a las 06:00 UTC. Diario da margen frente a los 7 días de
    # Supabase y a los posibles retrasos de los cron de GitHub Actions.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping endpoint que toca la BD
        run: |
          URL="https://exd-dashboard.onrender.com/api/dashboard/summary"
          # Render duerme y arranca en frío (~50s), así que reintentamos con
          # timeout generoso antes de dar el ping por fallido.
          for i in 1 2 3; do
            echo "Intento $i: GET $URL"
            code=$(curl -s -o /tmp/body.txt -w "%{http_code}" --max-time 120 "$URL" || echo "000")
            echo "HTTP $code"
            cat /tmp/body.txt; echo
            if [ "$code" = "200" ]; then
              echo "✅ Supabase activo, ping correcto."
              exit 0
            fi
            echo "Reintentando en 30s..."
            sleep 30
          done
          echo "❌ El endpoint no respondió 200 tras 3 intentos."
          exit 1
