services:
  - type: web
    name: exd-dashboard
    env: docker
    plan: free
    dockerfile: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exd-control.db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://exd-control-center.vercel.app"
