services:
  - type: web
    name: exd-dashboard
    env: docker
    plan: free
    dockerfile: ./Dockerfile
    envVars:
      # La BD ahora vive en Supabase (Postgres gratuito permanente), no en Render.
      # Pega el "Session pooler" connection string de Supabase en el dashboard de
      # Render → Environment. Marcado como secreto (sync:false) para no commitear
      # la contraseña.
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://exd-dashboard.vercel.app"
