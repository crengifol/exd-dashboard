services:
  - type: web
    name: exd-control-api
    env: python
    pythonVersion: 3.11
    plan: free
    buildCommand: cd backend && pip install --no-build-isolation -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exd-control-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://exd-control-center.vercel.app"
